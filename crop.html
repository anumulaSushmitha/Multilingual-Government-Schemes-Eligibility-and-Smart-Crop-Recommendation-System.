<!DOCTYPE html>
<html>

<style>

body{
font-family:Arial;
background:#f1f8e9;
padding:40px;
}

.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
width:500px;
margin:auto;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
background:#2e7d32;
color:white;
padding:12px;
border:none;
border-radius:6px;
width:100%;
font-size:16px;
}

h2{
text-align:center;
color:#2e7d32;
}

</style>

<body>

<div class="card">

<h2>{{labels.title}}</h2>

<form action="/predict_crop" method="POST">

<label>{{labels.nitrogen}}</label>
<input name="nitrogen">

<label>{{labels.phosphorus}}</label>
<input name="phosphorus">

<label>{{labels.potassium}}</label>
<input name="potassium">

<label>{{labels.temperature}}</label>
<input name="temperature">

<label>{{labels.humidity}}</label>
<input name="humidity">

<label>{{labels.ph}}</label>
<input name="ph">

<label>{{labels.rainfall}}</label>
<input name="rainfall">

<button>Predict Crop</button>

</form>

<h3 style="text-align:center;color:green">{{ result if result else "" }}</h3>

</div>

</body>
</html>
