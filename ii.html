<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuildWise | Auth</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="center">
    <div class="glass-card login-box" style="width: 100%; max-width: 400px;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h2 style="margin: 0; color: #10b981; font-size: 2rem;">BuildWise AI</h2>
            <p style="color: #94a3b8; font-size: 0.9rem;">Construction Estimator 2026</p>
        </div>

        <div style="display: flex; flex-direction: column; gap: 1rem;">
            <div>
                <label style="font-size: 0.8rem; color: #94a3b8; margin-left: 5px;">Username</label>
                <input type="text" id="user" placeholder="admin" style="width: 100%; box-sizing: border-box;">
            </div>
            
            <div>
                <label style="font-size: 0.8rem; color: #94a3b8; margin-left: 5px;">Password</label>
                <input type="password" id="pass" placeholder="1234" style="width: 100%; box-sizing: border-box;">
            </div>

            <button onclick="doLogin()" style="margin-top: 10px;">Sign In</button>
            
            <p id="err" class="error" style="color: #ef4444; font-size: 0.85rem; text-align: center; min-height: 1.2rem;"></p>
        </div>
    </div>

    <script>
        async function doLogin() {
            const username = document.getElementById('user').value;
            const password = document.getElementById('pass').value;
            const errEl = document.getElementById('err');
            
            errEl.innerText = ""; // Clear previous errors

            try {
                const res = await fetch('http://127.0.0.1:8000/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });

                if(res.ok) {
                    localStorage.setItem('auth', 'true');
                    window.location.href = 'dashboard.html';
                } else {
                    errEl.innerText = "Invalid credentials. Try admin / 1234";
                }
            } catch (error) {
                errEl.innerText = "Connection failed. Is the backend running?";
            }
        }

        // Allow "Enter" key to submit
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') doLogin();
        });
    </script>
</body>
</html>
